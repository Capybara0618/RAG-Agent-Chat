<!doctype html>
<html><body><div id="root">starting</div><script>
window.addEventListener('error', (e) => {
  document.getElementById('root').textContent = 'error:' + e.message + ' @ ' + (e.filename || '') + ':' + (e.lineno || '');
});
window.addEventListener('unhandledrejection', (e) => {
  document.getElementById('root').textContent = 'rejection:' + (e.reason && (e.reason.stack || e.reason.message || String(e.reason)));
});
</script><script type="module">import './js/pages-projects.js'; document.getElementById('root').textContent = 'ok';</script></body></html>
